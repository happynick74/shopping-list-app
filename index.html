<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #5a67d8;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .stats .done-count {
      color: #48bb78;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
      border-bottom: 1px solid #f7fafc;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e0;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    li.checked .checkbox {
      background: #48bb78;
      border-color: #48bb78;
    }

    .checkbox svg {
      display: none;
    }

    li.checked .checkbox svg {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
      cursor: pointer;
      user-select: none;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty-state {
      text-align: center;
      padding: 36px 0 20px;
      color: #a0aec0;
    }

    .empty-state .icon {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    .clear-done {
      margin-top: 20px;
      text-align: right;
    }

    .btn-clear {
      background: none;
      border: none;
      font-size: 0.82rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .btn-clear:hover {
      color: #fc8181;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <p class="subtitle">오늘 사야 할 것들을 적어보세요</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80" />
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats" style="display:none;">
      <span id="totalCount"></span>
      <span class="done-count" id="doneCount"></span>
    </div>

    <ul id="list"></ul>

    <div class="empty-state" id="emptyState">
      <div class="icon">🛒</div>
      <p>아직 아이템이 없어요.<br>위에서 추가해 보세요!</p>
    </div>

    <div class="clear-done" id="clearDoneArea" style="display:none;">
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const emptyState = document.getElementById('emptyState');
      const stats = document.getElementById('stats');
      const clearDoneArea = document.getElementById('clearDoneArea');

      list.innerHTML = '';

      if (items.length === 0) {
        emptyState.style.display = 'block';
        stats.style.display = 'none';
        clearDoneArea.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      stats.style.display = 'flex';

      const doneItems = items.filter(i => i.checked);
      document.getElementById('totalCount').textContent = `전체 ${items.length}개`;
      document.getElementById('doneCount').textContent = doneItems.length > 0 ? `완료 ${doneItems.length}개` : '';
      clearDoneArea.style.display = doneItems.length > 0 ? 'block' : 'none';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <div class="checkbox" onclick="toggleItem(${idx})">
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
              <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="item-text" onclick="toggleItem(${idx})">${escapeHtml(item.text)}</span>
          <button class="btn-delete" onclick="deleteItem(${idx})" title="삭제">✕</button>
        `;

        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      items.unshift({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.getElementById('itemInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
